# Traefik Dynamic Configuration - WebSocket Support
# All HTTP traffic is redirected to HTTPS; WebSocket routers use websecure only

http:
  routers:
    # Dashboard WebSocket (metrics live-stream)
    dashboard-websocket:
      rule: 'PathPrefix(`/api/metrics/live-stream`) && Headers(`Upgrade`, `websocket`)'
      service: dashboard-backend-service
      priority: 50
      middlewares:
        - security-headers
      entryPoints:
        - websecure
      tls: {}

    # n8n WebSocket (protected by dashboard session auth)
    n8n-websocket:
      rule: 'PathPrefix(`/n8n/`) && Headers(`Upgrade`, `websocket`)'
      service: n8n-service
      priority: 50
      middlewares:
        - forward-auth
        - strip-n8n-prefix
        - security-headers
      entryPoints:
        - websecure
      tls: {}

    # Telegram Bot Setup WebSocket
    # SEC-FIX: Added forward-auth to prevent unauthenticated access to setup tokens.
    # Browsers send cookies on same-origin WebSocket upgrade, so cookie-based JWT works.
    telegram-websocket:
      rule: 'PathPrefix(`/api/telegram-app/ws`) && Headers(`Upgrade`, `websocket`)'
      service: dashboard-backend-service
      priority: 50
      middlewares:
        - forward-auth
        - security-headers
      entryPoints:
        - websecure
      tls: {}

    # Claude Code Terminal WebSocket
    # SECURITY: forward-auth is required here — without it, the terminal is
    # accessible to anyone who can reach the host, bypassing dashboard login.
    # Browsers DO send cookies (including arasul_session) on same-origin
    # WebSocket upgrade requests, so cookie-based JWT validation works.
    claude-terminal-websocket:
      rule: 'PathPrefix(`/claude-terminal`) && Headers(`Upgrade`, `websocket`)'
      service: claude-terminal-service
      priority: 110
      middlewares:
        - forward-auth
        - security-headers
      entryPoints:
        - websecure
      tls: {}

    # Sandbox Terminal WebSocket
    # Auth handled by the backend via JWT token in query params.
    # forward-auth added as defense-in-depth (browser sends cookies on upgrade).
    sandbox-terminal-websocket:
      rule: 'PathPrefix(`/api/sandbox/terminal/ws`) && Headers(`Upgrade`, `websocket`)'
      service: dashboard-backend-service
      priority: 50
      middlewares:
        - forward-auth
        - security-headers
      entryPoints:
        - websecure
      tls: {}

  # Note: Services are already defined in routes.yml
  # WebSocket support is automatic when Connection: Upgrade header is present
