# Traefik Dynamic Configuration - WebSocket Support
# All HTTP traffic is redirected to HTTPS; WebSocket routers use websecure only

http:
  routers:
    # Dashboard WebSocket (metrics live-stream)
    dashboard-websocket:
      rule: 'PathPrefix(`/api/metrics/live-stream`) && Headers(`Upgrade`, `websocket`)'
      service: dashboard-backend-service
      priority: 50
      middlewares:
        - security-headers
      entryPoints:
        - websecure
      tls: {}

    # n8n WebSocket (protected by dashboard session auth)
    n8n-websocket:
      rule: 'PathPrefix(`/n8n/`) && Headers(`Upgrade`, `websocket`)'
      service: n8n-service
      priority: 50
      middlewares:
        - forward-auth
        - strip-n8n-prefix
        - security-headers
      entryPoints:
        - websecure
      tls: {}

    # Telegram Bot Setup WebSocket
    # SEC-FIX: Added forward-auth to prevent unauthenticated access to setup tokens.
    # Browsers send cookies on same-origin WebSocket upgrade, so cookie-based JWT works.
    telegram-websocket:
      rule: 'PathPrefix(`/api/telegram-app/ws`) && Headers(`Upgrade`, `websocket`)'
      service: dashboard-backend-service
      priority: 50
      middlewares:
        - forward-auth
        - security-headers
      entryPoints:
        - websecure
      tls: {}

    # Sandbox Terminal WebSocket
    # Auth handled entirely by the backend's upgrade handler (JWT from query param / cookie / header).
    # forward-auth REMOVED: it blocks WebSocket upgrades because Traefik's forwardAuth
    # only forwards Authorization + Cookie headers to /api/auth/verify, but the browser's
    # WebSocket constructor cannot set custom headers — the token comes via query param,
    # which forward-auth doesn't propagate. The backend verifies JWT before calling
    # sandboxTerminalWss.handleUpgrade(), so security is maintained.
    sandbox-terminal-websocket:
      rule: 'PathPrefix(`/api/sandbox/terminal/ws`) && Headers(`Upgrade`, `websocket`)'
      service: dashboard-backend-service
      priority: 50
      middlewares:
        - security-headers
      entryPoints:
        - websecure
      tls: {}

  # Note: Services are already defined in routes.yml
  # WebSocket support is automatic when Connection: Upgrade header is present
