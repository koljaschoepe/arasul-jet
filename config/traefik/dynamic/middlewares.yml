# Traefik Dynamic Configuration - Middlewares
# Rate limiting, authentication, headers, etc.

http:
  middlewares:
    # Rate Limiting Middlewares

    # n8n Webhooks: 100 requests/minute
    rate-limit-n8n:
      rateLimit:
        average: 100
        period: 1m
        burst: 20

    # LLM API: 10 requests/second
    rate-limit-llm:
      rateLimit:
        average: 10
        period: 1s
        burst: 5

    # Metrics API: 20 requests/second
    rate-limit-metrics:
      rateLimit:
        average: 20
        period: 1s
        burst: 10

    # Auth endpoints: 30 requests/minute (prevent brute force while allowing normal use)
    # Previous: 5/15min was too restrictive, caused login failures
    # Note: Backend also has login attempt tracking in database for security
    rate-limit-auth:
      rateLimit:
        average: 30
        period: 1m
        burst: 10

    # General API: 100 requests/second
    rate-limit-api:
      rateLimit:
        average: 100
        period: 1s
        burst: 50

    # Security Headers
    security-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        # HSTS disabled: LAN appliance uses HTTP, HTTPS/TLS not configured
        forceSTSHeader: false
        stsSeconds: 0
        customFrameOptionsValue: 'SAMEORIGIN'
        # Content-Security-Policy: restrict resource loading to same origin
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
        # Referrer-Policy: prevent leaking URLs to external services
        referrerPolicy: 'strict-origin-when-cross-origin'
        # Permissions-Policy: disable unnecessary browser features
        permissionsPolicy: 'camera=(), microphone=(), geolocation=(), payment=()'
        customResponseHeaders:
          X-Powered-By: 'Arasul Platform'
          Server: '' # Hide server info

    # CORS Headers
    # PHASE1-FIX: Restricted to local/private networks instead of wildcard "*"
    cors-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowOriginList:
          - 'http://localhost'
          - 'http://localhost:3000'
          - 'http://127.0.0.1'
          - 'http://127.0.0.1:3000'
          - 'https://localhost'
          - 'https://127.0.0.1'
        accessControlAllowOriginListRegex:
          - "^https?://192\\.168\\.[0-9]+\\.[0-9]+(:[0-9]+)?$"
          - "^https?://10\\.[0-9]+\\.[0-9]+\\.[0-9]+(:[0-9]+)?$"
          - "^https?://172\\.(1[6-9]|2[0-9]|3[0-1])\\.[0-9]+\\.[0-9]+(:[0-9]+)?$"
        accessControlAllowHeaders:
          - 'Content-Type'
          - 'Authorization'
          - 'X-Requested-With'
        accessControlExposeHeaders:
          - 'Content-Length'
          - 'Content-Type'
        accessControlMaxAge: 3600
        addVaryHeader: true

    # Forward Authentication (JWT validation via cookie or header)
    forward-auth:
      forwardAuth:
        address: 'http://dashboard-backend:3001/api/auth/verify'
        authRequestHeaders:
          - 'Authorization'
          - 'Cookie'
        authResponseHeaders:
          - 'X-User-Id'
          - 'X-User-Name'
          - 'X-User-Email'

    # MinIO Headers for reverse proxy
    minio-headers:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: 'https'
          X-Forwarded-For: ''
          X-Real-IP: ''

    strip-minio-api-prefix:
      stripPrefix:
        prefixes:
          - '/minio-api'
        forceSlash: false

    strip-models-prefix:
      stripPrefix:
        prefixes:
          - '/models'
        forceSlash: false

    strip-embeddings-prefix:
      stripPrefix:
        prefixes:
          - '/embeddings'
        forceSlash: false

    strip-n8n-prefix:
      stripPrefix:
        prefixes:
          - '/n8n'
        forceSlash: false

    # Compression
    compress:
      compress:
        excludedContentTypes:
          - 'text/event-stream'
          - 'application/grpc'

    # IP Whitelist (for admin routes - available for future use)
    admin-whitelist:
      ipWhiteList:
        sourceRange:
          - '127.0.0.1/32'
          - '172.30.0.0/24' # Docker network
          - '192.168.0.0/16' # Local network
          - '10.0.0.0/8' # Private network

    # Basic Auth for Traefik Dashboard
    # Regenerate: scripts/security/generate_htpasswd.sh admin
    basicAuth-traefik:
      basicAuth:
        users:
          - 'admin:$$2b$$10$$SamY/Wyo./gIZvPQKFrt1.BkvX9.9Gt8zePgLWgCNvfT7pBxD715m'
        realm: 'Traefik Dashboard'
        removeHeader: true

    # Basic Auth for n8n
    # Regenerate: scripts/security/generate_htpasswd.sh admin
    basicAuth-n8n:
      basicAuth:
        users:
          - 'admin:$$2b$$10$$SamY/Wyo./gIZvPQKFrt1.BkvX9.9Gt8zePgLWgCNvfT7pBxD715m'
        realm: 'n8n Workflow Engine'
        removeHeader: true

  # Servers transports for SSE streams (extended timeout)
  serversTransports:
    sse-transport:
      forwardingTimeouts:
        responseHeaderTimeout: 600s
        idleConnTimeout: 600s
