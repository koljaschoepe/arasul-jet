# Traefik Dynamic Configuration - Routes
# All HTTP traffic is redirected to HTTPS via entrypoint config in traefik.yml
# All routers below use the 'websecure' entrypoint only

http:
  routers:
    # Dashboard Frontend (catch-all, lowest priority)
    dashboard-frontend:
      rule: 'PathPrefix(`/`) && !PathPrefix(`/claude-terminal`)'
      service: dashboard-frontend-service
      priority: 1
      entryPoints:
        - websecure
      tls: {}

    # Dashboard Backend API
    dashboard-api:
      rule: 'PathPrefix(`/api`)'
      service: dashboard-backend-service
      priority: 10
      middlewares:
        - security-headers
        - rate-limit-api
        - compress
      entryPoints:
        - websecure
      tls: {}

    # Auth endpoints (with stricter rate limiting)
    auth-api:
      rule: 'PathPrefix(`/api/auth`)'
      service: dashboard-backend-service
      priority: 20
      middlewares:
        - security-headers
        - rate-limit-auth
      entryPoints:
        - websecure
      tls: {}

    # Metrics API (with rate limiting)
    metrics-api:
      rule: 'PathPrefix(`/api/metrics`)'
      service: dashboard-backend-service
      priority: 15
      middlewares:
        - security-headers
        - rate-limit-metrics
        - compress
      entryPoints:
        - websecure
      tls: {}

    # MinIO Console (requires dashboard login)
    minio-console:
      rule: 'PathPrefix(`/minio`)'
      service: minio-console-service
      priority: 100
      middlewares:
        - forward-auth
        - minio-headers
        - rate-limit-api
      entryPoints:
        - websecure
      tls: {}

    # MinIO S3 API (requires dashboard login)
    minio-api:
      rule: 'PathPrefix(`/minio-api`)'
      service: minio-api-service
      priority: 30
      middlewares:
        - forward-auth
        - strip-minio-api-prefix
        - security-headers
        - cors-headers
        - rate-limit-api
      entryPoints:
        - websecure
      tls: {}

    # LLM Service Direct Access (requires dashboard login)
    llm-direct:
      rule: 'PathPrefix(`/models`)'
      service: llm-service
      priority: 25
      middlewares:
        - forward-auth
        - strip-models-prefix
        - rate-limit-llm
        - security-headers
      entryPoints:
        - websecure
      tls: {}

    # Embeddings Service Direct Access (requires dashboard login)
    embeddings-direct:
      rule: 'PathPrefix(`/embeddings`)'
      service: embeddings-service
      priority: 25
      middlewares:
        - forward-auth
        - strip-embeddings-prefix
        - rate-limit-llm
        - security-headers
      entryPoints:
        - websecure
      tls: {}

    # Claude Code Web Terminal
    # Protected by forward-auth (requires dashboard login)
    claude-terminal:
      rule: 'PathPrefix(`/claude-terminal`)'
      service: claude-terminal-service
      priority: 100
      middlewares:
        - forward-auth
      entryPoints:
        - websecure
      tls: {}

    # n8n Workflow Engine
    # basicAuth-n8n: additional layer on top of n8n's own authentication
    n8n:
      rule: 'PathPrefix(`/n8n`)'
      service: n8n-service
      priority: 100
      middlewares:
        - basicAuth-n8n
        - strip-n8n-prefix
        - security-headers
      entryPoints:
        - websecure
      tls: {}

    # Dashboard Frontend Static Files
    dashboard-static:
      rule: 'PathPrefix(`/static/js`) || PathPrefix(`/static/css`) || PathPrefix(`/static/media`)'
      service: dashboard-frontend-service
      priority: 65
      entryPoints:
        - websecure
      tls: {}

    # n8n favicon (public, no auth)
    n8n-favicon:
      rule: 'Path(`/favicon.ico`)'
      service: n8n-service
      priority: 85
      entryPoints:
        - websecure
      tls: {}

    # n8n Webhooks (with rate limiting)
    n8n-webhooks:
      rule: 'PathPrefix(`/webhook`)'
      service: n8n-service
      priority: 25
      middlewares:
        - rate-limit-n8n
        - security-headers
      entryPoints:
        - websecure
      tls: {}

    # Traefik Dashboard (secured with Basic Auth)
    traefik-dashboard:
      rule: '(PathPrefix(`/api/traefik`) || PathPrefix(`/dashboard`))'
      service: api@internal
      priority: 35
      middlewares:
        - basicAuth-traefik
        - security-headers
        - rate-limit-auth
      entryPoints:
        - websecure
      tls: {}

  services:
    # Dashboard Frontend
    dashboard-frontend-service:
      loadBalancer:
        servers:
          - url: 'http://dashboard-frontend:3000'
        healthCheck:
          path: /
          interval: 30s
          timeout: 3s

    # Dashboard Backend
    dashboard-backend-service:
      loadBalancer:
        servers:
          - url: 'http://dashboard-backend:3001'
        healthCheck:
          path: /api/health
          interval: 10s
          timeout: 2s
        responseForwarding:
          flushInterval: 100ms
        passHostHeader: true

    # MinIO Console
    minio-console-service:
      loadBalancer:
        servers:
          - url: 'http://minio:9001'
        healthCheck:
          path: /
          interval: 30s
          timeout: 3s

    # MinIO S3 API
    minio-api-service:
      loadBalancer:
        servers:
          - url: 'http://minio:9000'
        healthCheck:
          path: /minio/health/live
          interval: 30s
          timeout: 3s

    # LLM Service (Ollama on port 11434)
    llm-service:
      loadBalancer:
        servers:
          - url: 'http://llm-service:11434'
        healthCheck:
          path: /api/tags
          interval: 30s
          timeout: 5s

    # Embeddings Service
    embeddings-service:
      loadBalancer:
        servers:
          - url: 'http://embedding-service:11435'
        healthCheck:
          path: /health
          interval: 30s
          timeout: 5s

    # n8n
    n8n-service:
      loadBalancer:
        servers:
          - url: 'http://n8n:5678'
        healthCheck:
          path: /healthz
          interval: 30s
          timeout: 3s

    # Claude Code Web Terminal
    claude-terminal-service:
      loadBalancer:
        servers:
          - url: 'http://claude-code:7681'
        passHostHeader: true
