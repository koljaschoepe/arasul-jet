# Arasul Platform - PostgreSQL Custom Configuration
# Overrides the default postgresql.conf inside the Docker image.
# IMPORTANT: listen_addresses must be set explicitly since this replaces defaults.

# Network - allow connections from other containers
listen_addresses = '*'

# WAL Configuration
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB

# WAL Archiving
archive_mode = on
archive_command = 'test ! -f /backups/wal/%f && cp %p /backups/wal/%f'
archive_timeout = 300

# Performance tuning for Jetson (ARM, NVMe SSD)
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 16MB
maintenance_work_mem = 128MB

# Checkpoint tuning
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min

# Logging
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = off
log_disconnections = off
