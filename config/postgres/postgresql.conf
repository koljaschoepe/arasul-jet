# Arasul Platform - PostgreSQL Custom Configuration
# Overrides the default postgresql.conf inside the Docker image.
# IMPORTANT: listen_addresses must be set explicitly since this replaces defaults.

# Network - allow connections from other containers
listen_addresses = '*'

# Extension preloading (pg_stat_statements for slow query analysis)
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 1000
pg_stat_statements.track = top

# WAL Configuration
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB

# WAL Archiving (enabled for point-in-time recovery between daily backups)
archive_mode = on
archive_command = 'test ! -f /backups/wal/%f && cp %p /backups/wal/%f'
archive_timeout = 300

# Performance tuning for Jetson (ARM, NVMe SSD, 32-64GB unified memory)
shared_buffers = 4GB
effective_cache_size = 12GB
work_mem = 64MB
maintenance_work_mem = 512MB

# WAL Performance
wal_compression = zstd
wal_buffers = 16MB

# Checkpoint tuning
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min

# Autovacuum tuning (critical for long-running edge appliance)
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_delay = 2ms

# Logging
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = off
log_disconnections = off
log_autovacuum_min_duration = 1000
log_lock_waits = on
log_temp_files = 10MB
