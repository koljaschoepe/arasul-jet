<!DOCTYPE html>
<html lang="de" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Arasul Platform Dashboard - Edge AI Management" />
    <title>Arasul Platform</title>
    <style>
      /* Minimal pre-CSS-load styles (loading screen only).
         Do NOT add * { margin/padding } here — it's un-layered CSS
         and would override ALL Tailwind @layer utilities. */
      body {
        background: #101923;
        color: #ffffff;
        margin: 0;
      }
      .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-size: 1.5rem;
        color: #00ff88;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
    </style>
  </head>
  <body class="dark-mode">
    <script>
      // Apply saved theme BEFORE React loads to prevent white flash.
      // Default is dark (set via HTML classes above). Only switch if user explicitly chose light.
      (function() {
        var t = localStorage.getItem('arasul_theme');
        if (t === 'light') {
          document.documentElement.classList.remove('dark');
          document.body.classList.remove('dark-mode');
          document.body.classList.add('light-mode');
          document.body.style.background = '#FFFFFF';
        }
      })();
    </script>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="loading">Arasul Platform wird geladen...</div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
