# Arasul Platform - Docker Secrets
# Mounts secret files into containers at /run/secrets/<name>
# Services read via _FILE env vars (resolveSecrets.js / native support)

secrets:
  postgres_password:
    file: ../config/secrets/postgres_password
  jwt_secret:
    file: ../config/secrets/jwt_secret
  minio_root_user:
    file: ../config/secrets/minio_root_user
  minio_root_password:
    file: ../config/secrets/minio_root_password
  n8n_encryption_key:
    file: ../config/secrets/n8n_encryption_key
  # Gemeinsames Auth-Token zwischen n8n (Task-Broker) und n8n-runners
  # (task-runner-launcher). Generiert von scripts/interactive_setup.sh bzw.
  # ./arasul bootstrap (setup_secrets) — nie committen.
  n8n_runners_auth_token:
    file: ../config/secrets/n8n_runners_auth_token
  # Fester n8n-Owner (Plan 007): Zugangsdaten des einzigen n8n-Owners, der beim
  # Container-Start idempotent provisioniert wird (services/n8n/entrypoint.sh)
  # und über den das Backend (routes/automations.js) die n8n-Session herstellt.
  # Generiert von scripts/interactive_setup.sh bzw. ./arasul bootstrap
  # (setup_secrets) — nie committen.
  n8n_owner_email:
    file: ../config/secrets/n8n_owner_email
  n8n_owner_password:
    file: ../config/secrets/n8n_owner_password
  admin_password:
    file: ../config/secrets/admin_password
  telegram_encryption_key:
    file: ../config/secrets/telegram_encryption_key
  telegram_bot_token:
    file: ../config/secrets/telegram_bot_token
  # Per-appliance pepper for HMAC-pseudonymising telegram_user_id values.
  # Phase 6 DSGVO. Rotation requires re-hashing all telegram_user_consent rows.
  telegram_user_id_pepper:
    file: ../config/secrets/telegram_user_id_pepper

services:
  postgres-db:
    secrets:
      - postgres_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password

  minio:
    secrets:
      - minio_root_user
      - minio_root_password
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password

  dashboard-backend:
    secrets:
      - postgres_password
      - jwt_secret
      - minio_root_user
      - minio_root_password
      - admin_password
      - telegram_encryption_key
      - telegram_bot_token
      - telegram_user_id_pepper
      # n8n-Owner-Zugangsdaten: das Backend meldet den festen Owner bei n8n an
      # (GET /api/automations/session), um die n8n-Session herzustellen.
      - n8n_owner_email
      - n8n_owner_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      ARASUL_DATA_DB_PASSWORD_FILE: /run/secrets/postgres_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      TELEGRAM_ENCRYPTION_KEY_FILE: /run/secrets/telegram_encryption_key
      TELEGRAM_BOT_TOKEN_FILE: /run/secrets/telegram_bot_token
      TELEGRAM_USER_ID_PEPPER_FILE: /run/secrets/telegram_user_id_pepper
      N8N_OWNER_EMAIL_FILE: /run/secrets/n8n_owner_email
      N8N_OWNER_PASSWORD_FILE: /run/secrets/n8n_owner_password

  document-indexer:
    secrets:
      - postgres_password
      - minio_root_user
      - minio_root_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password

  metrics-collector:
    secrets:
      - postgres_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password

  self-healing-agent:
    secrets:
      - postgres_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password

  backup-service:
    secrets:
      - postgres_password
      - minio_root_user
      - minio_root_password
      - n8n_encryption_key # for the daily key-escrow alongside the DB dump
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      # Without N8N_ENCRYPTION_KEY in the escrow, a Postgres dump is useless
      # for restoring n8n credentials. backup.sh writes a copy alongside the
      # daily snapshot when BACKUP_ENCRYPT=true (refuses without encryption).
      N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_encryption_key

  n8n:
    secrets:
      - n8n_encryption_key
      - n8n_runners_auth_token
      - postgres_password
      # Fester Owner (Plan 007): entrypoint.sh provisioniert ihn idempotent.
      - n8n_owner_email
      - n8n_owner_password
    environment:
      N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_encryption_key
      # Aufgelöst von services/n8n/entrypoint.sh (n8n selbst versteht die
      # *_FILE-Konvention für diese Variable nicht).
      N8N_RUNNERS_AUTH_TOKEN_FILE: /run/secrets/n8n_runners_auth_token
      DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/postgres_password
      # Owner-Provisionierung durch services/n8n/entrypoint.sh (POST /rest/owner/setup).
      N8N_OWNER_EMAIL_FILE: /run/secrets/n8n_owner_email
      N8N_OWNER_PASSWORD_FILE: /run/secrets/n8n_owner_password

  n8n-runners:
    secrets:
      - n8n_runners_auth_token
    environment:
      # Der task-runner-launcher versteht die *_FILE-Konvention nativ.
      N8N_RUNNERS_AUTH_TOKEN_FILE: /run/secrets/n8n_runners_auth_token
