# Arasul Platform - Monitoring & Operations
# Metrics Collector, Self-Healing Agent, Backup Service, Loki, Promtail

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '50m'
    max-file: '10'

x-security: &default-security
  security_opt:
    - no-new-privileges:true

services:
  # 1. Metrics Collector
  metrics-collector:
    build:
      context: ..
      dockerfile: services/metrics-collector/Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.11.12}
    container_name: metrics-collector
    hostname: metrics-collector
    restart: always
    networks:
      - arasul-backend
      - arasul-monitoring
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      METRICS_INTERVAL_LIVE: ${METRICS_INTERVAL_LIVE:-5}
      METRICS_INTERVAL_PERSIST: ${METRICS_INTERVAL_PERSIST:-60}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - /sys:/host/sys:ro
      - /proc:/host/proc:ro
      - arasul-metrics:/cache
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9100/health']
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    <<: *default-security
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: ${RAM_LIMIT_METRICS:-512M}
    logging: *default-logging

  # 2. Self-Healing Engine
  self-healing-agent:
    build:
      context: ..
      dockerfile: services/self-healing-agent/Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.11.12}
    container_name: self-healing-agent
    hostname: self-healing-agent
    restart: always
    networks:
      - arasul-backend
      - arasul-monitoring
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SELF_HEALING_INTERVAL: ${SELF_HEALING_INTERVAL}
      SELF_HEALING_ENABLED: ${SELF_HEALING_ENABLED}
      LOG_LEVEL: ${SELF_HEALING_LOG_LEVEL}
      METRICS_COLLECTOR_HOST: metrics-collector
      METRICS_COLLECTOR_PORT: 9100
      DISK_WARNING_PERCENT: ${DISK_WARNING_PERCENT}
      DISK_CLEANUP_PERCENT: ${DISK_CLEANUP_PERCENT}
      DISK_CRITICAL_PERCENT: ${DISK_CRITICAL_PERCENT}
      DISK_REBOOT_PERCENT: ${DISK_REBOOT_PERCENT}
      HEARTBEAT_PORT: ${SELF_HEALING_HEARTBEAT_PORT:-9200}
      EXCLUDED_CONTAINERS: 'claude-code'
      DOCKER_HOST: tcp://docker-proxy:2375
    volumes:
      - ../logs:/arasul/logs
      - /sys:/host/sys:ro
      - /proc:/host/proc:ro
      - /media:/media:ro
      - /mnt:/mnt:ro
      - ../data/updates:/arasul/updates
      - ../data/backups:/arasul/backups
    devices:
      - /dev/bus/usb:/dev/bus/usb
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
      - SYS_BOOT
      - SYS_NICE
    # no-new-privileges intentionally omitted: sudo reboot requires setuid
    depends_on:
      postgres-db:
        condition: service_healthy
      metrics-collector:
        condition: service_healthy
      docker-proxy:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python3', '/app/heartbeat.py', '--test']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: ${RAM_LIMIT_SELF_HEALING:-512M}

  # 3. Backup Service
  backup-service:
    build:
      context: ../services/backup-service
      dockerfile: Dockerfile
    container_name: backup-service
    hostname: backup-service
    restart: always # RELIABILITY-FIX: was unless-stopped — ensures backups resume after crash
    networks:
      - arasul-backend
      - arasul-monitoring
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MINIO_HOST: minio
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_WEEKLY_RETENTION_WEEKS: ${BACKUP_WEEKLY_RETENTION_WEEKS:-12}
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - ../data/backups:/backups
      - arasul-wal:/backups/wal
      - ../scripts/backup/backup.sh:/usr/local/bin/backup-full.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pgrep crond > /dev/null || exit 1']
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    <<: *default-security
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: ${RAM_LIMIT_BACKUP:-256M}

  # 4. Loki - Log Aggregation (optional: docker compose --profile monitoring up)
  loki:
    image: grafana/loki:2.9.3
    container_name: loki
    hostname: loki
    restart: always
    profiles:
      - monitoring
    networks:
      - arasul-monitoring
    volumes:
      - ../config/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - arasul-loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test:
        ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    <<: *default-security
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: ${RAM_LIMIT_LOKI:-512M}

  # 5. Promtail - Log Collector (optional: docker compose --profile monitoring up)
  promtail:
    image: grafana/promtail:2.9.3
    container_name: promtail
    hostname: promtail
    restart: always
    profiles:
      - monitoring
    networks:
      - arasul-monitoring
    volumes:
      - ../config/promtail/config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - arasul-logs:/arasul/logs:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', "bash -c '</dev/tcp/localhost/9080' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=32M
      - /run:size=8M
    <<: *default-security
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: ${RAM_LIMIT_PROMTAIL:-256M}

networks:
  arasul-monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.128/26

volumes:
  arasul-metrics:
  arasul-logs:
  arasul-loki:
