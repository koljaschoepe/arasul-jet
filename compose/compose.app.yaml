# Arasul Platform - Application Services
# Dashboard Backend, Dashboard Frontend, n8n Workflow Engine

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '50m'
    max-file: '10'

x-security: &default-security
  security_opt:
    - no-new-privileges:true

services:
  # 1. Dashboard Backend
  dashboard-backend:
    build:
      context: ..
      dockerfile: apps/dashboard-backend/Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-22}
    container_name: dashboard-backend
    hostname: dashboard-backend
    restart: always
    networks:
      - arasul-frontend
      - arasul-backend
      - arasul-monitoring
    group_add:
      # P6.6: docker GID — defaults to 994 (Jetson default), override via env.
      - '${DOCKER_GID:-994}'
    environment:
      NODE_ENV: production
      PORT: ${DASHBOARD_BACKEND_PORT}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      LLM_SERVICE_HOST: ${LLM_SERVICE_HOST}
      LLM_SERVICE_PORT: ${LLM_SERVICE_PORT}
      EMBEDDING_SERVICE_HOST: ${EMBEDDING_SERVICE_HOST}
      EMBEDDING_SERVICE_PORT: ${EMBEDDING_SERVICE_PORT}
      MINIO_HOST: ${MINIO_HOST}
      MINIO_PORT: ${MINIO_PORT}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      QDRANT_HOST: ${QDRANT_HOST}
      QDRANT_PORT: ${QDRANT_PORT}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME}
      DOCUMENT_INDEXER_HOST: ${DOCUMENT_INDEXER_HOST:-document-indexer}
      DOCUMENT_INDEXER_API_PORT: ${DOCUMENT_INDEXER_API_PORT:-9102}
      DOCUMENT_INDEXER_MINIO_BUCKET: ${DOCUMENT_INDEXER_MINIO_BUCKET:-documents}
      ARASUL_DATA_DB_HOST: ${ARASUL_DATA_DB_HOST:-postgres-db}
      ARASUL_DATA_DB_PORT: ${ARASUL_DATA_DB_PORT:-5432}
      ARASUL_DATA_DB_NAME: ${ARASUL_DATA_DB_NAME:-arasul_data_db}
      ARASUL_DATA_DB_USER: ${ARASUL_DATA_DB_USER:-arasul_data}
      # ARASUL_DATA_DB_PASSWORD resolved via Docker secret (compose.secrets.yaml)
      JWT_EXPIRY: ${JWT_EXPIRY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      SYSTEM_VERSION: ${SYSTEM_VERSION}
      BUILD_HASH: ${BUILD_HASH}
      LOG_LEVEL: ${LOG_LEVEL}
      # Shared secret for the /api/events/webhook/self-healing endpoint. When set,
      # callers must send a matching x-webhook-secret header (defense-in-depth on
      # top of the LAN IP allowlist). Generated per box in .env.
      SELF_HEALING_WEBHOOK_SECRET: ${SELF_HEALING_WEBHOOK_SECRET:-}
      RAG_ENABLE_MULTI_QUERY: 'false'
      RAG_ENABLE_HYDE: 'false'
      RAG_ENABLE_DECOMPOUND: 'true'
      RAG_ENABLE_RERANKING: 'true'
      RAG_QUERY_OPTIMIZER_MODEL: ''
      ENV_FILE_PATH: /arasul/config/.env
      COMPOSE_PROJECT_DIR: ${COMPOSE_PROJECT_DIR:-.}
      DOCKER_HOST: tcp://docker-proxy:2375
      DOCKER_NETWORK: arasul-platform_arasul-backend
    volumes:
      - ../.env:/arasul/config/.env
      - ../config:/config:ro
      - ../data/updates:/arasul/updates
      - ../data/backups:/arasul/backups:ro
      - ../data/appstore/manifests:/arasul/appstore/manifests:ro
      - ../data/ssh-keys:/arasul/ssh-keys:ro
      - ../services/postgres/init:/arasul/migrations:ro
      - ../data/sandbox/projects:/arasul/sandbox/projects
      - ../services/sandbox:/arasul/sandbox-build:ro
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres-db:
        condition: service_healthy
      minio:
        condition: service_healthy
      docker-proxy:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT_DASHBOARD:-4}'
          memory: ${RAM_LIMIT_BACKEND:-1G}
          pids: 256
    stop_grace_period: 35s
    labels:
      - 'traefik.enable=false'
    logging: *default-logging

  # 2. Dashboard Frontend
  dashboard-frontend:
    build:
      context: ..
      dockerfile: apps/dashboard-frontend/Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-22}
    container_name: dashboard-frontend
    hostname: dashboard-frontend
    restart: always
    networks:
      - arasul-frontend
    depends_on:
      dashboard-backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://127.0.0.1:3000/ || exit 1']
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=32M
      - /var/cache/nginx:size=32M
      - /run:size=8M
    <<: *default-security
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    labels:
      - 'traefik.enable=false'
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: ${RAM_LIMIT_FRONTEND:-256M}
          pids: 64

  # 3. n8n Workflow Engine
  n8n:
    build:
      context: ../services/n8n
      dockerfile: Dockerfile
    container_name: n8n
    hostname: n8n
    restart: always
    networks:
      - arasul-frontend
      - arasul-backend
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_SECURE_COOKIE: '${N8N_SECURE_COOKIE:-true}'
      N8N_EDITOR_BASE_URL: ${N8N_EXTERNAL_URL}
      N8N_PATH: '/n8n/'
      N8N_BASIC_AUTH_ACTIVE: 'false'
      # WEBHOOK_URL: full https URL where n8n is reachable from the public internet.
      # Empty → n8n disables webhook-URL generation; workflows that need webhooks must
      # be set up in long-poll/manual mode. Set N8N_WEBHOOK_URL in the host .env when a
      # public hostname is available. Do NOT default to localhost — that broke external
      # SaaS callbacks because n8n handed out localhost URLs.
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
      # N8N_ENCRYPTION_KEY: resolved at container start by services/n8n/entrypoint.sh
      # from the Docker secret n8n_encryption_key (mounted via compose.secrets.yaml).
      # n8n upstream does not understand the *_FILE convention.
      # PostgreSQL persistence (without this, n8n falls back to SQLite and loses all data on restart)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres-db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-arasul_db}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-arasul}
      # DB_POSTGRESDB_PASSWORD resolved via Docker secret (compose.secrets.yaml)
      DB_POSTGRESDB_SCHEMA: n8n
      # Execution-data retention (DSGVO):
      #   - SUCCESS=none: only failures keep payload — drastically reduces personal-data
      #     accumulation in the n8n.execution_data table. Failures still keep full I/O for
      #     debugging (see EXECUTIONS_DATA_PRUNE_MAX_COUNT below if errors stack up).
      #   - PRUNE_ENABLED + MAX_AGE=336h (14d) caps retention even for errors and manuals.
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: 'none'
      EXECUTIONS_DATA_SAVE_ON_ERROR: 'all'
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: 'false'
      EXECUTIONS_DATA_PRUNE: 'true'
      EXECUTIONS_DATA_MAX_AGE: '336'
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: '50000'
      N8N_USER_MANAGEMENT_JWT_DURATION_HOURS: '720'
      N8N_PERSONALIZATION_ENABLED: 'true'
      N8N_PUSH_BACKEND: 'websocket'
      GENERIC_TIMEZONE: 'Europe/Berlin'
      TZ: 'Europe/Berlin'
      N8N_CUSTOM_EXTENSIONS: /custom-nodes
      N8N_TRUST_PROXY: 'true'
      # n8n sits behind exactly one trusted proxy (Traefik) — needed for correct rate-limit
      # source-IP attribution and for OAuth2 callbacks behind the reverse proxy.
      N8N_PROXY_HOPS: '1'
      N8N_RUNNERS_ENABLED: 'true'
      N8N_RUNNERS_MODE: 'internal' # external mode deferred — see docs/plans/active/EXTERNAL_INTEGRATIONS.md §5.4
      # Hardening (Phase 2 of EXTERNAL_INTEGRATIONS plan) — see docs/integrations/N8N_HARDENING.md
      N8N_BLOCK_ENV_ACCESS_IN_NODE: 'true' # Code/Function nodes cannot read process.env
      N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES: 'true' # Code nodes cannot read n8n's own files
      N8N_RESTRICT_FILE_ACCESS_TO: '/home/node/.n8n' # File access whitelist
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: 'true' # 0600 on settings file
      N8N_GIT_NODE_DISABLE_BARE_REPOS: 'true' # Git node hardening
      N8N_PAYLOAD_SIZE_MAX: '8' # MiB (default 16) — DoS mitigation
      N8N_DEFAULT_BINARY_DATA_MODE: 'filesystem' # Don't keep large blobs in RAM on Jetson
      N8N_DIAGNOSTICS_ENABLED: 'false' # GDPR — no telemetry to n8n.io
      N8N_VERSION_NOTIFICATIONS_ENABLED: 'false'
      N8N_HIRING_BANNER_ENABLED: 'false'
      # Supply-chain hardening: customers cannot install community packages from npm at runtime.
      # If a vendor-specific node is needed, vendor it into this Dockerfile build.
      N8N_COMMUNITY_PACKAGES_ENABLED: 'false'
      # Block dangerous core nodes that give shell-equivalent power.
      # executeCommand = arbitrary OS commands inside the n8n container.
      # ssh             = arbitrary SSH commands to anywhere n8n can reach.
      NODES_EXCLUDE: '["n8n-nodes-base.executeCommand","n8n-nodes-base.ssh"]'
    volumes:
      - arasul-n8n:/home/node/.n8n
      - ../services/n8n/credentials:/custom-credentials:ro
      - ../services/n8n/templates:/custom-templates:ro
    depends_on:
      postgres-db:
        condition: service_healthy
      # P6.3: llm-service / embedding-service use service_started (not
      # service_healthy). Their healthchecks have a long start_period (LLM
      # spends 5min loading a model) and a single GPU crash should NOT
      # cascade-block n8n startup. n8n's own workflow code retries against
      # downstream services anyway.
      llm-service:
        condition: service_started
      embedding-service:
        condition: service_started
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:5678/healthz']
      interval: 15s
      timeout: 2s
      retries: 3
      start_period: 60s
    <<: *default-security
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: ${RAM_LIMIT_N8N:-2G}
          pids: 256
    labels:
      - 'traefik.enable=false'
    logging: *default-logging

volumes:
  arasul-n8n:
