# Arasul Platform - Application Services
# Dashboard Backend, Dashboard Frontend, n8n Workflow Engine

services:
  # 1. Dashboard Backend
  dashboard-backend:
    build:
      context: ..
      dockerfile: apps/dashboard-backend/Dockerfile
    container_name: dashboard-backend
    hostname: dashboard-backend
    restart: always
    networks:
      - arasul-frontend
      - arasul-backend
      - arasul-monitoring
    group_add:
      - '994'
    environment:
      NODE_ENV: production
      PORT: ${DASHBOARD_BACKEND_PORT}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      LLM_SERVICE_HOST: ${LLM_SERVICE_HOST}
      LLM_SERVICE_PORT: ${LLM_SERVICE_PORT}
      EMBEDDING_SERVICE_HOST: ${EMBEDDING_SERVICE_HOST}
      EMBEDDING_SERVICE_PORT: ${EMBEDDING_SERVICE_PORT}
      MINIO_HOST: ${MINIO_HOST}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      QDRANT_HOST: ${QDRANT_HOST}
      QDRANT_PORT: ${QDRANT_PORT}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME}
      DOCUMENT_INDEXER_HOST: ${DOCUMENT_INDEXER_HOST:-document-indexer}
      DOCUMENT_INDEXER_API_PORT: ${DOCUMENT_INDEXER_API_PORT:-9102}
      DOCUMENT_INDEXER_MINIO_BUCKET: ${DOCUMENT_INDEXER_MINIO_BUCKET:-documents}
      ARASUL_DATA_DB_HOST: ${ARASUL_DATA_DB_HOST:-postgres-db}
      ARASUL_DATA_DB_PORT: ${ARASUL_DATA_DB_PORT:-5432}
      ARASUL_DATA_DB_NAME: ${ARASUL_DATA_DB_NAME:-arasul_data_db}
      ARASUL_DATA_DB_USER: ${ARASUL_DATA_DB_USER:-arasul_data}
      ARASUL_DATA_DB_PASSWORD: ${ARASUL_DATA_DB_PASSWORD:-${POSTGRES_PASSWORD}}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      SYSTEM_VERSION: ${SYSTEM_VERSION}
      BUILD_HASH: ${BUILD_HASH}
      LOG_LEVEL: ${LOG_LEVEL}
      RAG_ENABLE_MULTI_QUERY: 'false'
      RAG_ENABLE_HYDE: 'false'
      RAG_ENABLE_DECOMPOUND: 'true'
      RAG_ENABLE_RERANKING: 'true'
      RAG_QUERY_OPTIMIZER_MODEL: ''
      ENV_FILE_PATH: /arasul/config/.env
      COMPOSE_PROJECT_DIR: ${COMPOSE_PROJECT_DIR:-.}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../.env:/arasul/config/.env
      - ../config:/config:ro
      - ../data/updates:/arasul/updates
      - ../data/backups:/arasul/backups:ro
      - ../data/appstore/manifests:/arasul/appstore/manifests:ro
      - ../data/ssh-keys:/arasul/ssh-keys:ro
    security_opt:
      - no-new-privileges:true
      - apparmor:arasul-backend
    depends_on:
      postgres-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT_DASHBOARD}'
          memory: ${RAM_LIMIT_BACKEND:-1G}
    labels:
      - 'traefik.enable=false'
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '10'

  # 2. Dashboard Frontend
  dashboard-frontend:
    build:
      context: ..
      dockerfile: apps/dashboard-frontend/Dockerfile
    container_name: dashboard-frontend
    hostname: dashboard-frontend
    restart: always
    networks:
      - arasul-frontend
    healthcheck:
      test: ['CMD', 'test', '-f', '/usr/share/nginx/html/index.html']
      interval: 10s
      timeout: 1s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=32M
      - /var/cache/nginx:size=32M
      - /run:size=8M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    labels:
      - 'traefik.enable=false'
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '10'
    deploy:
      resources:
        limits:
          memory: ${RAM_LIMIT_FRONTEND:-256M}

  # 3. n8n Workflow Engine
  n8n:
    build:
      context: ../services/n8n
      dockerfile: Dockerfile
    container_name: n8n
    hostname: n8n
    restart: always
    networks:
      - arasul-backend
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_SECURE_COOKIE: '${N8N_SECURE_COOKIE:-false}'
      N8N_EDITOR_BASE_URL: ${N8N_EXTERNAL_URL:-http://localhost:5678}
      N8N_PATH: '/n8n/'
      N8N_BASIC_AUTH_ACTIVE: 'false'
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: 'true'
      N8N_USER_MANAGEMENT_JWT_DURATION_HOURS: '720'
      N8N_PERSONALIZATION_ENABLED: 'true'
      N8N_PUSH_BACKEND: 'websocket'
      GENERIC_TIMEZONE: 'Europe/Berlin'
      TZ: 'Europe/Berlin'
      N8N_CUSTOM_EXTENSIONS: /custom-nodes
      N8N_TRUST_PROXY: 'true'
      N8N_RUNNERS_ENABLED: 'true'
      N8N_RUNNERS_MODE: 'internal'
    volumes:
      - arasul-n8n:/home/node/.n8n
      - ../services/n8n/credentials:/custom-credentials:ro
      - ../services/n8n/templates:/custom-templates:ro
    depends_on:
      postgres-db:
        condition: service_healthy
      llm-service:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:5678/healthz']
      interval: 15s
      timeout: 2s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${RAM_LIMIT_N8N}
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.services.n8n-docker.loadbalancer.server.port=5678'
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '10'

networks:
  arasul-frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/26
  arasul-backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.64/26
  arasul-monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.128/26

volumes:
  arasul-n8n:
