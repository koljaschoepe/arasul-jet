# Arasul Platform - Core Infrastructure
# PostgreSQL, MinIO, Traefik Reverse Proxy

services:
  # 1. PostgreSQL - Telemetry and Audit Database
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    hostname: postgres-db
    restart: always
    networks:
      - arasul-backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_MAX_CONNECTIONS: ${POSTGRES_MAX_CONNECTIONS}
      ARASUL_DATA_DB_NAME: ${ARASUL_DATA_DB_NAME:-arasul_data_db}
      ARASUL_DATA_DB_USER: ${ARASUL_DATA_DB_USER:-arasul_data}
      ARASUL_DATA_DB_PASSWORD: ${ARASUL_DATA_DB_PASSWORD:-${POSTGRES_PASSWORD}}
    volumes:
      - arasul-postgres:/var/lib/postgresql/data
      - ../services/postgres/init:/docker-entrypoint-initdb.d
      - ../services/postgres/init-data-db:/docker-entrypoint-initdb.d/data-db:ro
      - ../services/postgres/migrations:/migrations
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 2s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${RAM_LIMIT_POSTGRES}
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '10'

  # 2. MinIO - Object Storage
  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    restart: always
    networks:
      - arasul-backend
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER: ${MINIO_BROWSER}
    volumes:
      - arasul-minio:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 1s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '10'
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${RAM_LIMIT_MINIO:-4G}

  # 3. Reverse Proxy (Traefik)
  reverse-proxy:
    image: traefik:v2.11
    container_name: reverse-proxy
    hostname: reverse-proxy
    restart: always
    networks:
      - arasul-frontend
      - arasul-backend
    command:
      - '--configFile=/etc/traefik/traefik.yml'
    ports:
      - '80:80'
      - '443:443'
      - '127.0.0.1:8080:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../config/traefik:/etc/traefik:ro
      - arasul-letsencrypt:/letsencrypt
      - ../logs:/arasul/logs
    depends_on:
      postgres-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'traefik', 'healthcheck', '--ping']
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '10'
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: ${RAM_LIMIT_REVERSE_PROXY:-512M}

networks:
  arasul-frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/26
  arasul-backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.64/26

volumes:
  arasul-postgres:
  arasul-data-db:
  arasul-minio:
  arasul-letsencrypt:
