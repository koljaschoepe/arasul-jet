# Arasul Platform - Core Infrastructure
# PostgreSQL, MinIO, Traefik Reverse Proxy

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '50m'
    max-file: '10'

x-security: &default-security
  security_opt:
    - no-new-privileges:true

services:
  # 1. PostgreSQL - Telemetry and Audit Database
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    hostname: postgres-db
    restart: always
    networks:
      - arasul-backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_MAX_CONNECTIONS: ${POSTGRES_MAX_CONNECTIONS}
      ARASUL_DATA_DB_NAME: ${ARASUL_DATA_DB_NAME:-arasul_data_db}
      ARASUL_DATA_DB_USER: ${ARASUL_DATA_DB_USER:-arasul_data}
      ARASUL_DATA_DB_PASSWORD: ${ARASUL_DATA_DB_PASSWORD:-${POSTGRES_PASSWORD}}
    command:
      - 'postgres'
      - '-c'
      - 'config_file=/etc/postgresql/postgresql.conf'
    volumes:
      - arasul-postgres:/var/lib/postgresql/data
      - ../services/postgres/init:/docker-entrypoint-initdb.d
      - ../services/postgres/init-data-db:/docker-entrypoint-initdb.d/data-db:ro
      - ../services/postgres/migrations:/migrations
      - ../config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - arasul-wal:/backups/wal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 2s
      retries: 3
    <<: *default-security
    deploy:
      resources:
        limits:
          memory: ${RAM_LIMIT_POSTGRES:-4G}
    logging: *default-logging

  # 2. MinIO - Object Storage
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    hostname: minio
    restart: always
    networks:
      - arasul-backend
    command: server /data --console-address ":9001"
    environment:
      MINIO_BROWSER: ${MINIO_BROWSER}
    volumes:
      - arasul-minio:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 1s
      retries: 3
    logging: *default-logging
    <<: *default-security
    deploy:
      resources:
        limits:
          memory: ${RAM_LIMIT_MINIO:-4G}

  # 3. Docker Socket Proxy - Restricts Docker API access for backend services
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-proxy
    hostname: docker-proxy
    restart: always
    networks:
      - arasul-backend
    environment:
      # Granted API sections
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      NETWORKS: 1
      VOLUMES: 1
      EXEC: 1
      SYSTEM: 1
      BUILD: 1
      POST: 1
      # Fine-grained container controls
      ALLOW_START: 1
      ALLOW_STOP: 1
      ALLOW_RESTARTS: 1
      # Explicitly denied (defaults)
      AUTH: 0
      SECRETS: 0
      SWARM: 0
      NODES: 0
      PLUGINS: 0
      SERVICES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /run:size=8M
      - /tmp:noexec,nosuid,size=8M
    <<: *default-security
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: ${RAM_LIMIT_DOCKER_PROXY:-128M}
    logging: *default-logging

  # 4. Reverse Proxy (Traefik)
  reverse-proxy:
    image: traefik:v2.11
    container_name: reverse-proxy
    hostname: reverse-proxy
    restart: always
    networks:
      - arasul-frontend
      - arasul-backend
    command:
      - '--configFile=/etc/traefik/traefik.yml'
    ports:
      - '80:80'
      - '443:443'
      - '127.0.0.1:8080:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../config/traefik:/etc/traefik:ro
      - ../logs:/arasul/logs
    depends_on:
      postgres-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8080/ping || exit 1']
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    logging: *default-logging
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    <<: *default-security
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - DAC_READ_SEARCH # Read TLS key files owned by host user
    deploy:
      resources:
        limits:
          memory: ${RAM_LIMIT_REVERSE_PROXY:-512M}

networks:
  arasul-frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/26
  arasul-backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.64/26

volumes:
  arasul-postgres:
  arasul-minio:
  arasul-wal:
