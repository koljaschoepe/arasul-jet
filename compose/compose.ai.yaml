# Arasul Platform - AI Services
# LLM (Ollama), Embedding, Qdrant Vector DB, Document Indexer

services:
  # 1. Qdrant - Vector Database for RAG
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    hostname: qdrant
    restart: always
    networks:
      - arasul-backend
    volumes:
      - arasul-qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: '6334'
      QDRANT__SERVICE__HTTP_PORT: '6333'
    healthcheck:
      test: ['CMD', 'test', '-f', '/qdrant/storage/raft_state.json']
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '10'
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${RAM_LIMIT_QDRANT:-6G}

  # 2. LLM Service (Ollama)
  llm-service:
    build:
      context: ./services/llm-service
      dockerfile: Dockerfile
    container_name: llm-service
    hostname: llm-service
    restart: always
    networks:
      - arasul-backend
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      LLM_MODEL: ${LLM_MODEL:-qwen3:14b-q8}
      LLM_KEEP_ALIVE_SECONDS: ${LLM_KEEP_ALIVE_SECONDS:-300}
      OLLAMA_STARTUP_TIMEOUT: ${OLLAMA_STARTUP_TIMEOUT:-120}
      OLLAMA_FLASH_ATTENTION: '1'
      OLLAMA_KV_CACHE_TYPE: 'q8_0'
      OLLAMA_NUM_PARALLEL: '1'
      OLLAMA_MAX_LOADED_MODELS: '1'
    volumes:
      - arasul-llm-models:/root/.ollama
      - ./services/llm-service/healthcheck.sh:/healthcheck.sh:ro
      - ./data/models:/host-models:ro
    runtime: nvidia
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT_LLM}'
          memory: ${RAM_LIMIT_LLM}
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', '/bin/bash', '/healthcheck.sh']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 300s
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '10'

  # 3. Embedding Service
  embedding-service:
    build:
      context: ./services/embedding-service
      dockerfile: Dockerfile
    container_name: embedding-service
    hostname: embedding-service
    restart: always
    networks:
      - arasul-backend
    environment:
      MODEL_NAME: ${EMBEDDING_MODEL}
      SERVICE_PORT: ${EMBEDDING_SERVICE_PORT}
      SERVICE_URL: http://localhost:${EMBEDDING_SERVICE_PORT}
      VECTOR_SIZE: ${EMBEDDING_VECTOR_SIZE}
      MAX_INPUT_TOKENS: ${EMBEDDING_MAX_INPUT_TOKENS}
      EMBEDDING_VECTOR_SIZE: ${EMBEDDING_VECTOR_SIZE:-1024}
      EMBEDDING_MAX_INPUT_TOKENS: ${EMBEDDING_MAX_INPUT_TOKENS:-8192}
      ENABLE_RERANKING: 'true'
      FLASHRANK_MODEL: ms-marco-MiniLM-L-12-v2
      BGE_RERANKER_MODEL: BAAI/bge-reranker-v2-m3
      CUDA_VISIBLE_DEVICES: 0
      TORCH_CUDA_ARCH_LIST: '${TORCH_CUDA_ARCH_LIST:-8.7}'
    volumes:
      - arasul-embeddings-models:/models
      - ./services/embedding-service/healthcheck.sh:/healthcheck.sh:ro
    runtime: nvidia
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT_EMBEDDING}'
          memory: ${RAM_LIMIT_EMBEDDING:-12G}
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', '/bin/bash', '/healthcheck.sh']
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 300s
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '10'

  # 4. Document Indexer - Automatic document indexing for RAG
  document-indexer:
    build:
      context: ./services/document-indexer
      dockerfile: Dockerfile
    container_name: document-indexer
    hostname: document-indexer
    restart: always
    networks:
      - arasul-backend
    environment:
      MINIO_HOST: ${MINIO_HOST}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      DOCUMENT_INDEXER_MINIO_BUCKET: ${DOCUMENT_INDEXER_MINIO_BUCKET}
      QDRANT_HOST: ${QDRANT_HOST}
      QDRANT_PORT: ${QDRANT_PORT}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME}
      EMBEDDING_SERVICE_HOST: ${EMBEDDING_SERVICE_HOST}
      EMBEDDING_SERVICE_PORT: ${EMBEDDING_SERVICE_PORT}
      EMBEDDING_VECTOR_SIZE: ${EMBEDDING_VECTOR_SIZE}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      LLM_SERVICE_HOST: ${LLM_SERVICE_HOST}
      LLM_SERVICE_PORT: ${LLM_SERVICE_PORT}
      LLM_MODEL: ${LLM_MODEL}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DOCUMENT_INDEXER_INTERVAL: ${DOCUMENT_INDEXER_INTERVAL}
      DOCUMENT_INDEXER_CHUNK_SIZE: ${DOCUMENT_INDEXER_CHUNK_SIZE}
      DOCUMENT_INDEXER_CHUNK_OVERLAP: ${DOCUMENT_INDEXER_CHUNK_OVERLAP}
      DOCUMENT_INDEXER_API_PORT: ${DOCUMENT_INDEXER_API_PORT:-9102}
      DOCUMENT_INDEXER_ENABLE_AI: ${DOCUMENT_INDEXER_ENABLE_AI:-true}
      DOCUMENT_INDEXER_ENABLE_SIMILARITY: ${DOCUMENT_INDEXER_ENABLE_SIMILARITY:-true}
      DOCUMENT_INDEXER_SIMILARITY_THRESHOLD: ${DOCUMENT_INDEXER_SIMILARITY_THRESHOLD:-0.8}
      DOCUMENT_MAX_SIZE_MB: ${DOCUMENT_MAX_SIZE_MB:-100}
      DOCUMENT_INDEXER_PARENT_CHUNK_SIZE: ${DOCUMENT_INDEXER_PARENT_CHUNK_SIZE:-2000}
      DOCUMENT_INDEXER_CHILD_CHUNK_SIZE: ${DOCUMENT_INDEXER_CHILD_CHUNK_SIZE:-400}
      DOCUMENT_INDEXER_CHILD_CHUNK_OVERLAP: ${DOCUMENT_INDEXER_CHILD_CHUNK_OVERLAP:-50}
      BM25_INDEX_PATH: /data/bm25_index
    volumes:
      - arasul-bm25-index:/data/bm25_index
    depends_on:
      postgres-db:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
      llm-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9102/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '10'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: ${RAM_LIMIT_DOCUMENT_INDEXER:-2G}

networks:
  arasul-backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.64/26

volumes:
  arasul-llm-models:
  arasul-embeddings-models:
  arasul-qdrant:
  arasul-bm25-index:
