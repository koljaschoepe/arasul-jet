# Arasul Platform - AI Services
# LLM (Ollama), Embedding, Qdrant Vector DB, Document Indexer

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '50m'
    max-file: '10'

x-security: &default-security
  security_opt:
    - no-new-privileges:true

services:
  # 1. Qdrant - Vector Database for RAG
  qdrant:
    image: qdrant/qdrant:v1.16.1
    container_name: qdrant
    hostname: qdrant
    restart: always
    stop_grace_period: 30s
    networks:
      - arasul-backend
    volumes:
      - arasul-qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: '6334'
      QDRANT__SERVICE__HTTP_PORT: '6333'
    # P6.7 (revised after smoke): qdrant v1.16 image has bash but /dev/tcp is
    # not enabled, and there's no wget / curl / nc. perl IS shipped (the
    # debian-slim base ships it). Use perl to do a TCP-connect + HTTP GET to
    # /readyz and check for HTTP/1.x 200. Verified with `docker compose exec
    # qdrant perl -e ...` returning exit 0 when ready.
    healthcheck:
      test:
        - CMD
        - perl
        - -e
        - 'use IO::Socket::INET; my $$s = IO::Socket::INET->new(PeerAddr=>"localhost:6333",Timeout=>2) or exit 1; print $$s "GET /readyz HTTP/1.0\r\nHost: localhost\r\n\r\n"; my $$line = <$$s>; exit ($$line =~ /200/ ? 0 : 1)'
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    logging: *default-logging
    <<: *default-security
    deploy:
      resources:
        limits:
          memory: ${RAM_LIMIT_QDRANT:-6G}
          cpus: '4.0'
          pids: 128

  # 2. LLM Service (Ollama)
  llm-service:
    build:
      context: ..
      dockerfile: services/llm-service/Dockerfile
    container_name: llm-service
    hostname: llm-service
    restart: always
    networks:
      - arasul-backend
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      LLM_MODEL: ${LLM_MODEL:-gemma4:26b-q4}
      LLM_KEEP_ALIVE_SECONDS: ${LLM_KEEP_ALIVE_SECONDS:-3600}
      OLLAMA_STARTUP_TIMEOUT: ${OLLAMA_STARTUP_TIMEOUT:-120}
      OLLAMA_FLASH_ATTENTION: '1'
      OLLAMA_KV_CACHE_TYPE: 'q4_0'
      # Default-Kontextfenster für alle geladenen Modelle. n8n-Agent-Workflows
      # (Tools Agent + qwen3:8b) brauchen ≥32k — Ollamas Default (4k) schneidet
      # Tool-Definitionen + Verlauf sonst STILL ab und der Agent "vergisst"
      # seine Tools. KV-Cache-Kosten sind durch q4_0 + Flash Attention
      # gedämpft; auf knappen 32-GB-Orins via .env absenkbar.
      # Siehe docs/integrations/N8N_AGENTS.md §Kontextfenster.
      OLLAMA_CONTEXT_LENGTH: '${OLLAMA_CONTEXT_LENGTH:-32768}'
      # NUM_PARALLEL=2 lets two chat requests stream concurrently (Balanced
      # latency target: 2 users OK, 3+ queue). Lower to 1 on tight 32 GB Orin
      # by exporting OLLAMA_NUM_PARALLEL=1 in .env.
      OLLAMA_NUM_PARALLEL: '${OLLAMA_NUM_PARALLEL:-2}'
      OLLAMA_MAX_LOADED_MODELS: '${OLLAMA_MAX_LOADED_MODELS:-3}'
      OLLAMA_NUM_GPU: '99'
      # CUDA/Tegra library paths for JetPack 6 GPU acceleration
      LD_LIBRARY_PATH: /usr/local/cuda/lib64:/usr/lib/aarch64-linux-gnu/nvidia:/usr/lib/aarch64-linux-gnu:/usr/lib/ollama/cuda_jetpack6
    volumes:
      - arasul-llm-models:/home/ollama/.ollama
      - ../services/llm-service/healthcheck.sh:/healthcheck.sh:ro
      - ../data/models:/host-models:ro
      # Mount host CUDA toolkit (cuBLAS, cuDNN, cuDart) for GPU inference
      - /usr/local/cuda/lib64:/usr/local/cuda/lib64:ro
    ports:
      # Bind to localhost only — never expose the unauthenticated Ollama API to the
      # LAN. Internal containers reach it via the network name (llm-service:11434);
      # host-local clients via 127.0.0.1. Remote/Tailscale access, if needed, must go
      # through an authenticated proxy (e.g. `tailscale serve tcp 11434`), not here.
      - '127.0.0.1:11434:11434' # Ollama API (host-local only)
    runtime: nvidia
    tmpfs:
      - /tmp:noexec,nosuid,size=256M
    <<: *default-security
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT_LLM:-8}'
          memory: ${RAM_LIMIT_LLM:-32G}
          pids: 512
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres-db:
        condition: service_healthy
    stop_grace_period: 30s
    healthcheck:
      test: ['CMD', '/bin/bash', '/healthcheck.sh']
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    logging: *default-logging

  # 3. Embedding Service
  embedding-service:
    build:
      context: ..
      dockerfile: services/embedding-service/Dockerfile
      args:
        L4T_PYTORCH_TAG: ${L4T_PYTORCH_TAG:-r36.4.0}
        CUDA_ARCH_LIST: ${TORCH_CUDA_ARCH_LIST:-8.7}
    container_name: embedding-service
    hostname: embedding-service
    restart: always
    networks:
      - arasul-backend
    environment:
      MODEL_NAME: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      SERVICE_PORT: ${EMBEDDING_SERVICE_PORT:-11435}
      SERVICE_URL: http://localhost:${EMBEDDING_SERVICE_PORT:-11435}
      VECTOR_SIZE: ${EMBEDDING_VECTOR_SIZE:-1024}
      MAX_INPUT_TOKENS: ${EMBEDDING_MAX_INPUT_TOKENS:-8192}
      EMBEDDING_VECTOR_SIZE: ${EMBEDDING_VECTOR_SIZE:-1024}
      EMBEDDING_MAX_INPUT_TOKENS: ${EMBEDDING_MAX_INPUT_TOKENS:-8192}
      SENTENCE_TRANSFORMERS_HOME: /models
      ENABLE_RERANKING: 'true'
      FLASHRANK_MODEL: ms-marco-MiniLM-L-12-v2
      BGE_RERANKER_MODEL: BAAI/bge-reranker-v2-m3
      EMBEDDING_USE_FP16: 'true'
      STAGE2_VRAM_FLOOR_MB: '${STAGE2_VRAM_FLOOR_MB:-4096}'
      CUDA_VISIBLE_DEVICES: 0
      TORCH_CUDA_ARCH_LIST: '${TORCH_CUDA_ARCH_LIST:-8.7}'
    volumes:
      - arasul-embeddings-models:/models
    runtime: nvidia
    tmpfs:
      - /tmp:noexec,nosuid,size=256M
    <<: *default-security
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT_EMBEDDING:-4}'
          memory: ${RAM_LIMIT_EMBEDDING:-12G}
          pids: 512
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres-db:
        condition: service_healthy
    stop_grace_period: 30s
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:11435/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 600s
    logging: *default-logging

  # 4. Document Indexer - Automatic document indexing for RAG
  document-indexer:
    build:
      context: ..
      dockerfile: services/document-indexer/Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.11.12}
    container_name: document-indexer
    hostname: document-indexer
    restart: always
    networks:
      - arasul-backend
    environment:
      MINIO_HOST: ${MINIO_HOST}
      MINIO_PORT: ${MINIO_PORT}
      # MINIO_ROOT_USER / MINIO_ROOT_PASSWORD resolved via Docker secrets (compose.secrets.yaml)
      DOCUMENT_INDEXER_MINIO_BUCKET: ${DOCUMENT_INDEXER_MINIO_BUCKET}
      QDRANT_HOST: ${QDRANT_HOST}
      QDRANT_PORT: ${QDRANT_PORT}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME}
      EMBEDDING_SERVICE_HOST: ${EMBEDDING_SERVICE_HOST}
      EMBEDDING_SERVICE_PORT: ${EMBEDDING_SERVICE_PORT}
      EMBEDDING_VECTOR_SIZE: ${EMBEDDING_VECTOR_SIZE}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      LLM_SERVICE_HOST: ${LLM_SERVICE_HOST}
      LLM_SERVICE_PORT: ${LLM_SERVICE_PORT}
      LLM_MODEL: ${LLM_MODEL}
      KG_REFINE_MODEL: ${KG_REFINE_MODEL:-${LLM_MODEL}}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      # POSTGRES_PASSWORD resolved via Docker secret (compose.secrets.yaml)
      POSTGRES_DB: ${POSTGRES_DB}
      DOCUMENT_INDEXER_INTERVAL: ${DOCUMENT_INDEXER_INTERVAL}
      DOCUMENT_INDEXER_MAX_DOCS_PER_CYCLE: ${DOCUMENT_INDEXER_MAX_DOCS_PER_CYCLE:-10}
      DOCUMENT_INDEXER_CHUNK_SIZE: ${DOCUMENT_INDEXER_CHUNK_SIZE}
      DOCUMENT_INDEXER_CHUNK_OVERLAP: ${DOCUMENT_INDEXER_CHUNK_OVERLAP}
      DOCUMENT_INDEXER_API_PORT: ${DOCUMENT_INDEXER_API_PORT:-9102}
      DOCUMENT_INDEXER_ENABLE_AI: ${DOCUMENT_INDEXER_ENABLE_AI:-true}
      DOCUMENT_INDEXER_ENABLE_SIMILARITY: ${DOCUMENT_INDEXER_ENABLE_SIMILARITY:-true}
      DOCUMENT_INDEXER_SIMILARITY_THRESHOLD: ${DOCUMENT_INDEXER_SIMILARITY_THRESHOLD:-0.8}
      DOCUMENT_MAX_SIZE_MB: ${DOCUMENT_MAX_SIZE_MB:-100}
      DOCUMENT_INDEXER_PARENT_CHUNK_SIZE: ${DOCUMENT_INDEXER_PARENT_CHUNK_SIZE:-2000}
      DOCUMENT_INDEXER_CHILD_CHUNK_SIZE: ${DOCUMENT_INDEXER_CHILD_CHUNK_SIZE:-150}
      DOCUMENT_INDEXER_CHILD_CHUNK_OVERLAP: ${DOCUMENT_INDEXER_CHILD_CHUNK_OVERLAP:-30}
      BM25_INDEX_PATH: /data/bm25_index
    volumes:
      - arasul-bm25-index:/data/bm25_index
    depends_on:
      postgres-db:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
      # llm-service dependency removed — indexer retries AI analysis when LLM becomes available
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9102/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: ${RAM_LIMIT_DOCUMENT_INDEXER:-2G}
          pids: 128

  # 5. SearXNG — Meta-Suchmaschine fuer die Web-Recherche von Skills (Plan 011)
  #
  # Warum ein eigener Container statt einer Such-API: kein Drittanbieter-Konto,
  # kein Schluessel, keine Abfragen, die das Geraet einem Anbieter zuordnen.
  # SearXNG buendelt oeffentliche Suchmaschinen und liefert das Ergebnis als
  # JSON — genau das, was das Werkzeug braucht.
  #
  # Der Dienst ist bewusst NICHT ueber Traefik erreichbar: Er hat kein
  # Login und niemand soll ihn von aussen anfragen koennen. Nur das Backend
  # spricht ihn ueber das interne Netz an.
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    hostname: searxng
    restart: always
    networks:
      - arasul-backend
    volumes:
      # READ-ONLY, und das ist wichtig: config/searxng/ liegt IM Repository.
      # Schreibbar montiert koennte der Container das Geheimnis in eine
      # versionierte Datei schreiben — ein Geheimnis, das `git status` dann
      # zum Commit anbietet.
      #
      # Im Einstiegspunkt des Images geprueft (2026-07-21, searxng:latest):
      # Das `sed -i` auf settings.yml laeuft NUR, wenn die Datei fehlt und
      # erst aus der Vorlage erzeugt wird. Unsere Datei existiert, also wird
      # nie hineingeschrieben. Das Skript laeuft mit `set -u`, nicht `set -e`
      # — ein an der Schreibsperre scheiternder `chown` beendet es also nicht.
      - ../config/searxng:/etc/searxng:ro
    environment:
      # Das Geheimnis wird je Geraet erzeugt und in .env abgelegt
      # (./arasul bootstrap bzw. deploy-local.sh). settings_defaults.py
      # deklariert server.secret_key mit environ_name='SEARXNG_SECRET' — die
      # Variable schlaegt die Datei, deshalb steht in unserer settings.yml
      # bewusst kein secret_key.
      #
      # Der Rueckfallwert ist ABSICHTLICH der bekannte Platzhalter und nicht
      # leer: SearXNG prueft beim Start genau auf 'ultrasecretkey' und bricht
      # dann mit klarer Meldung ab. Die Uebernahme aus der Umgebung ist eine
      # reine VORHANDENSEINS-Pruefung (settings_defaults.py: `environ_name in
      # os.environ`), kein Test auf Inhalt — ein leerer Wert wuerde also
      # uebernommen, und SearXNG liefe still mit leerem Schluessel weiter.
      # Lieber lautes Scheitern als ein Dienst, der scheinbar laeuft.
      SEARXNG_SECRET: ${SEARXNG_SECRET:-ultrasecretkey}
      # Der Einstiegspunkt wuerde sonst versuchen, den read-only montierten
      # Ordner umzuschreiben, und eine Warnung ins Log schreiben.
      FORCE_OWNERSHIP: 'false'
      SEARXNG_BASE_URL: http://searxng:8080/
      UWSGI_WORKERS: '2'
      UWSGI_THREADS: '2'
    # Bewusst die Startseite statt /healthz: Sie antwortet in jeder Version mit
    # 200, sobald die Anwendung laeuft. Ein Healthcheck, der auf einen Pfad
    # zeigt, den es in der jeweiligen Version vielleicht nicht gibt, meldet
    # einen gesunden Dienst als krank — das ist schlimmer als etwas grob.
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/', timeout=5).status == 200 else 1)"
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 30s
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    cap_add:
      # uwsgi bindet 8080 (>1024) — der Cap ist nur fuer den Fall, dass das
      # Image kuenftig einen privilegierten Port waehlt.
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: ${RAM_LIMIT_SEARXNG:-512M}
          pids: 128

volumes:
  arasul-llm-models:
  arasul-embeddings-models:
  arasul-qdrant:
  arasul-bm25-index:
