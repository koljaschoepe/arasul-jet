<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Beispiel-App</title>
    <style>
      body {
        font: 16px/1.6 system-ui, sans-serif;
        margin: 0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        background: #0b100e;
        color: #f1f6f3;
      }
      .card {
        border: 1px solid #37453f;
        border-radius: 14px;
        padding: 2rem 2.4rem;
        max-width: 32rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.6rem;
      }
      button {
        margin-top: 1rem;
        font: inherit;
        border: 0;
        border-radius: 999px;
        padding: 0.5rem 1.2rem;
        background: #4fd6b4;
        color: #0b100e;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Beispiel-App</h1>
      <p>Diese App-Erweiterung ist die Vorlage für einen eigenen Tab in Arasul.</p>
      <button id="ping">Zählen</button>
      <p id="out">0</p>
    </div>
    <script>
      let n = 0;
      const out = document.getElementById('out');
      document.getElementById('ping').addEventListener('click', () => {
        out.textContent = String(++n);
      });
    </script>
  </body>
</html>
