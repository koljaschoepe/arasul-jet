# Arasul Sandbox — tmux config for web terminal (xterm.js)
# Optimized for persistent sessions accessed via browser

# Large scrollback buffer (50K lines vs 10K in xterm.js)
set -g history-limit 50000

# Enable mouse support (scroll, click, resize panes)
set -g mouse on

# 256 color + true color support
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Reduce escape time for faster key response
set -g escape-time 10

# Disable status bar — web UI already shows connection info
set -g status off

# Window/pane numbering starts at 1
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on
