# Arasul Platform - Docker Compose
# ==============================================================================
name: arasul-platform
# Startup Order (enforced by depends_on in each compose file):
#   1. postgres-db, minio          (compose.core.yaml)
#   2. qdrant, llm-service,        (compose.ai.yaml)
#      embedding-service
#   3. metrics-collector            (compose.monitoring.yaml)
#   4. reverse-proxy                (compose.core.yaml)
#   5. dashboard-backend,           (compose.app.yaml)
#      dashboard-frontend, n8n
#   6. document-indexer             (compose.ai.yaml)
#   7. self-healing-agent,          (compose.monitoring.yaml)
#      backup-service
#   8. loki, promtail               (compose.monitoring.yaml)
#
# Usage:
#   docker compose up -d                              # All services
#   docker compose --profile tunnel up -d             # + Cloudflare Tunnel
#   docker compose up -d dashboard-backend            # Single service
# ==============================================================================

include:
  - path: ./compose/compose.secrets.yaml
  - path: ./compose/compose.core.yaml
  - path: ./compose/compose.ai.yaml
  - path: ./compose/compose.app.yaml
  - path: ./compose/compose.monitoring.yaml
  - path: ./compose/compose.external.yaml
