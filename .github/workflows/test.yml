name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------------
  # Backend: lint + full Jest suite (coverage thresholds enforced via
  # package.json). Runs from the monorepo root so `file:` workspace deps to
  # @arasul/shared-schemas resolve correctly.
  # ----------------------------------------------------------------------------
  backend:
    name: Backend (lint + jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Lint (backend)
        run: npm run lint:backend

      - name: Jest (with coverage)
        working-directory: apps/dashboard-backend
        run: npx jest --coverage --maxWorkers=2

      # Advisory: reports high/critical vulnerabilities so they show up in the
      # Actions summary without blocking the pipeline. Run from workspace root
      # so the single root lockfile is audited once per CI run.
      - name: npm audit (advisory)
        run: npm audit --audit-level=high --omit=dev || true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/dashboard-backend/coverage/
          retention-days: 14

  # ----------------------------------------------------------------------------
  # Frontend: lint + vitest. Same workspace-root install strategy as backend.
  # ----------------------------------------------------------------------------
  frontend:
    name: Frontend (lint + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      # TODO(Phase-6.1b): frontend lint (~1500 legacy errors), tsc (~580 type
      # errors) and vitest (~90 failing component tests) are a deliberately
      # deferred, tracked backlog — pre-existing, not regressions. All three run
      # ADVISORY so the pipeline (incl. auto-merge) is not blocked while the
      # backlog is burned down. The typecheck step below makes the tsc number
      # visible so it can be ratcheted toward zero; flip continue-on-error to
      # false once the count reaches zero.
      - name: Typecheck (frontend, tsc) · advisory
        working-directory: apps/dashboard-frontend
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Lint (frontend) · advisory
        run: npm run lint:frontend
        continue-on-error: true

      - name: Vitest (with coverage) · advisory
        working-directory: apps/dashboard-frontend
        run: npx vitest run --coverage
        continue-on-error: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/dashboard-frontend/coverage/
          retention-days: 14

  # ----------------------------------------------------------------------------
  # Docker build smoke — each image must at least build. No full-stack run.
  # Backend uses the multi-stage 'test' target so test deps + tests are
  # exercised by the build itself.
  # ----------------------------------------------------------------------------
  docker-build:
    name: Docker build · ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: dashboard-backend
            dockerfile: apps/dashboard-backend/Dockerfile
            context: .
            target: runtime
          - name: dashboard-backend-test
            dockerfile: apps/dashboard-backend/Dockerfile
            context: .
            target: test
          - name: dashboard-frontend
            dockerfile: apps/dashboard-frontend/Dockerfile
            context: .
          - name: metrics-collector
            dockerfile: services/metrics-collector/Dockerfile
            context: .
          - name: self-healing-agent
            dockerfile: services/self-healing-agent/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          push: false
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

  # ----------------------------------------------------------------------------
  # Lockfile drift guard (Master-Plan P9-4 / AC2): the repo keeps a single
  # ROOT package-lock.json. `npm ci` from root must install every workspace
  # cleanly — it errors if a package.json bump landed without updating the root
  # lock, the exact drift that broke main on 2026-05-05. This directly tests the
  # failure mode (and is robust to npm-version canonical-form differences that a
  # byte-exact `--package-lock-only` diff would false-positive on).
  # ----------------------------------------------------------------------------
  lockfile-guard:
    name: Lockfile drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Root lock must install cleanly (npm ci)
        run: npm ci --ignore-scripts

  # ----------------------------------------------------------------------------
  # Python services: non-blocking pytest. Some services have no tests yet.
  # ----------------------------------------------------------------------------
  python-services:
    name: Python · ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [metrics-collector, self-healing-agent]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock || true
          if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi

      - name: Run pytest (non-blocking if no tests)
        working-directory: services/${{ matrix.service }}
        run: pytest --cov=. --cov-report=xml || echo "Tests not yet implemented (non-blocking)"

  # ----------------------------------------------------------------------------
  # Summary: aggregate pass/fail so branch protection can require a single
  # check instead of listing every matrix cell.
  # ----------------------------------------------------------------------------
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker-build, python-services, lockfile-guard]
    if: always()
    steps:
      - name: Aggregate results
        run: |
          echo "Backend:         ${{ needs.backend.result }}"
          echo "Frontend:        ${{ needs.frontend.result }}"
          echo "Docker build:    ${{ needs.docker-build.result }}"
          echo "Python services: ${{ needs.python-services.result }}"
          echo "Lockfile guard:  ${{ needs.lockfile-guard.result }}"
          case "${{ needs.backend.result }}-${{ needs.frontend.result }}-${{ needs.docker-build.result }}-${{ needs.lockfile-guard.result }}" in
            success-success-success-success) echo "All required jobs passed"; exit 0 ;;
            *) echo "One or more required jobs failed"; exit 1 ;;
          esac
