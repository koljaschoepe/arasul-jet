# Dependabot configuration for Arasul Platform
# Automatically creates PRs for dependency updates
# Documentation: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # All Node workspaces (root devDeps + apps/dashboard-{backend,frontend} +
  # packages/*) share ONE root package-lock.json — the root-only lockfile
  # strategy (Master-Plan P9-4). A SINGLE npm entry at '/' regenerates that one
  # lock for every bump, so `npm ci` from root stays in sync after a merge.
  # Do NOT re-add per-workspace npm entries: they update a workspace
  # package.json without touching the root lock and break main (2026-05-05).
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'npm'
    commit-message:
      prefix: 'chore(deps)'
    groups:
      express:
        patterns:
          - 'express*'
          - 'body-parser'
          - 'cors'
      security:
        patterns:
          - 'jsonwebtoken'
          - 'bcrypt*'
          - 'helmet'
      testing:
        patterns:
          - 'jest*'
          - 'supertest'
      react:
        patterns:
          - 'react*'
          - '@testing-library/*'
      visualization:
        patterns:
          - 'recharts'
          - 'mermaid'

  # n8n Custom Nodes
  - package-ecosystem: 'npm'
    directory: '/services/n8n/custom-nodes/n8n-nodes-arasul-llm'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'npm'
      - 'n8n'
    commit-message:
      prefix: 'chore(deps-n8n)'

  - package-ecosystem: 'npm'
    directory: '/services/n8n/custom-nodes/n8n-nodes-arasul-embeddings'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 3
    labels:
